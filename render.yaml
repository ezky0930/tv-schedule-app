# Render(렌더) 배포 설정 — 백엔드 API 서버.
# Render 대시보드에서 "New + → Blueprint" 로 이 저장소를 연결하면 이 파일을 자동으로 읽는다.
# (자세한 단계는 DEPLOY.md 참고)
services:
  - type: web
    name: tv-ott-backend
    runtime: node
    plan: free # 무료 플랜 (일정 시간 미사용 시 잠들었다가 첫 요청에 깨어남)
    region: singapore # 한국에서 가까운 지역
    # --include=dev: NODE_ENV=production 이어도 빌드용 devDependency(typescript) 설치 보장
    buildCommand: npm install --include=dev && npm run build:shared && npm run build -w @tv/backend
    startCommand: node packages/backend/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TMDB_AUTH_MODE
        value: v4
      # 아래 두 개는 보안상 대시보드에서 직접 입력 (sync:false → 코드에 안 들어감)
      - key: TMDB_API_KEY
        sync: false
      - key: CORS_ORIGIN # 프론트(Vercel) 주소. 예: https://tv-ott.vercel.app
        sync: false
